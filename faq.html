<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ — fullmoon studio</title>
  <meta name="description" content="풀문 스튜디오 자주 묻는 질문 FAQ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* FAQ Page Specific */
    .faq-page {
      min-height: 100vh;
      background: var(--ink);
      padding: 140px 40px 100px;
    }

    .faq-header {
      max-width: 720px;
      margin: 0 auto 64px;
    }

    .faq-header .kicker {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--moon);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .faq-header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 700;
      color: var(--white);
      margin: 0 0 16px;
      line-height: 1.1;
    }

    .faq-header p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 15px;
      line-height: 1.6;
    }

    .faq-list {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .faq-item {
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .faq-item:last-child {
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .faq-question {
      width: 100%;
      background: none;
      border: none;
      padding: 28px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      text-align: left;
      gap: 24px;
    }

    .faq-question span {
      font-family: 'Inter', sans-serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--white);
      line-height: 1.5;
    }

    .faq-icon {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .faq-icon::before,
    .faq-icon::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 1px;
      transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
    }

    .faq-icon::before {
      width: 16px;
      height: 2px;
    }

    .faq-icon::after {
      width: 2px;
      height: 16px;
    }

    .faq-item.active .faq-icon::after {
      transform: rotate(90deg);
      opacity: 0;
    }

    .faq-item.active .faq-icon::before {
      background: var(--moon);
    }

    .faq-question:hover span {
      color: var(--moon);
    }

    .faq-question:hover .faq-icon::before,
    .faq-question:hover .faq-icon::after {
      background: var(--moon);
    }

    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.2, 0, 0, 1), padding 0.4s cubic-bezier(0.2, 0, 0, 1);
    }

    .faq-item.active .faq-answer {
      max-height: 300px;
    }

    .faq-answer p {
      padding: 0 0 28px;
      color: rgba(255, 255, 255, 0.55);
      font-size: 15px;
      line-height: 1.8;
      max-width: 600px;
    }

    .faq-back {
      max-width: 720px;
      margin: 48px auto 0;
    }

    .faq-back a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .faq-back a:hover {
      color: var(--moon);
    }

    @media (max-width: 640px) {
      .faq-page {
        padding: 120px 20px 80px;
      }

      .faq-question span {
        font-size: 15px;
      }

      .faq-answer p {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-glass">
      <a class="logo" href="index.html" aria-label="fullmoon studio 홈">fullmoon</a>
      <nav class="desktop-nav">
        <a href="index.html#portfolio">포트폴리오</a>
        <a href="index.html#packages">패키지 안내</a>
        <a href="index.html#branches">지점안내</a>
        <a href="faq.html" style="color: var(--moon);">FAQ</a>
      </nav>
      <button class="menu-button" type="button" aria-expanded="false" aria-controls="site-menu" data-menu-button>
        <span></span>
        <span></span>
      </button>
    </div>
    <nav class="mobile-menu" id="site-menu" data-menu>
      <a href="index.html#portfolio">포트폴리오</a>
      <a href="index.html#packages">패키지 안내</a>
      <a href="index.html#branches">지점안내</a>
      <a href="faq.html" style="color: var(--moon);">FAQ</a>
    </nav>
  </header>

  <div class="faq-page">
    <div class="faq-header">
      <p class="kicker">FAQ</p>
      <h1>자주 묻는 질문</h1>
      <p>촬영 전 궁금하신 점을 확인해 보세요.</p>
    </div>

    <div class="faq-list">
      <div class="faq-item">
        <button class="faq-question" aria-expanded="false">
          <span>당일 예약도 가능한가요?</span>
          <div class="faq-icon"></div>
        </button>
        <div class="faq-answer">
          <p>네, 강남·가든파이브·잠실 3개 지점 모두 당일 예약이 가능합니다. 네이버 예약 페이지에서 실시간으로 확인해 주세요.</p>
        </div>
      </div>

      <div class="faq-item">
        <button class="faq-question" aria-expanded="false">
          <span>어떤 옷을 입고 가야 하나요?</span>
          <div class="faq-icon"></div>
        </button>
        <div class="faq-answer">
          <p>단색 계열의 깔끔한 상의를 추천드립니다. 큰 로고나 화려한 패턴은 피해 주세요.</p>
        </div>
      </div>

      <div class="faq-item">
        <button class="faq-question" aria-expanded="false">
          <span>사진은 언제 받을 수 있나요?</span>
          <div class="faq-icon"></div>
        </button>
        <div class="faq-answer">
          <p>증명사진은 촬영 당일 즉시 출력 제공됩니다. 프로필·가족사진 보정본은 별도 안내드립니다.</p>
        </div>
      </div>
    </div>

    <div class="faq-back">
      <a href="index.html">← 메인으로 돌아가기</a>
    </div>
  </div>

  <script>
    // Mobile menu toggle
    const menuButton = document.querySelector("[data-menu-button]");
    const menu = document.querySelector("[data-menu]");
    if (menuButton && menu) {
      menuButton.addEventListener("click", () => {
        const isOpen = menu.classList.toggle("is-open");
        menuButton.setAttribute("aria-expanded", isOpen ? "true" : "false");
      });
      menu.querySelectorAll("a").forEach((link) => {
        link.addEventListener("click", () => {
          menu.classList.remove("is-open");
          menuButton.setAttribute("aria-expanded", "false");
        });
      });
    }

    // FAQ Accordion
    const faqItems = document.querySelectorAll('.faq-item');
    faqItems.forEach(item => {
      const question = item.querySelector('.faq-question');
      question.addEventListener('click', () => {
        const isActive = item.classList.contains('active');

        // Close all items
        faqItems.forEach(i => {
          i.classList.remove('active');
          i.querySelector('.faq-question').setAttribute('aria-expanded', 'false');
        });

        // Open clicked item (if it wasn't already open)
        if (!isActive) {
          item.classList.add('active');
          question.setAttribute('aria-expanded', 'true');
        }
      });
    });
  </script>
</body>
</html>
